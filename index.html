<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鳳梨訂購登記</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
        :root { --primary-color: #2D6A4F; --bg-color: #F0F4F2; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg-color); padding: 15px; color: #333; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        h2 { color: var(--primary-color); text-align: center; margin-top: 0; }
        .section { display: none; margin-bottom: 20px; }
        .active { display: block; }
        
        label { display: block; margin: 10px 0 5px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; margin-bottom: 10px; }
        button { width: 100%; padding: 15px; background-color: var(--primary-color); color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
        button:disabled { background-color: #ccc; }
        .loading-overlay { text-align: center; padding: 50px 0; }
    </style>
</head>
<body>

<div class="card">
    <h2>🍍 阿閎鳳梨訂購</h2>

    <div id="loading" class="loading-overlay">
        <p>系統連線中，請稍候...</p>
    </div>

    <div id="registerSection" class="section">
        <p style="text-align: center; color: #666;">👋 您好！首次訂購請先登記資料</p>
        <label>您的姓名</label>
        <input type="text" id="regName" placeholder="例如：王小明">
        <label>電話號碼</label>
        <input type="tel" id="regPhone" placeholder="例如：0912345678">
        <button onclick="nextStep()">下一步：開始訂購</button>
    </div>

    <div id="orderSection" class="section">
        <p id="welcomeMsg" style="margin-bottom: 15px;"></p>
        
        <label>選擇產品</label>
        <select id="productType">
            <option value="少量自取">🍍 少量訂購（自取 1斤$30）</option>
            <option value="箱購宅配">📦 箱購送禮（宅配 含運）</option>
            <option value="鳳梨豆豉醬">🫙 鳳梨豆豉醬（限量）</option>
        </select>

        <label>訂購數量</label>
        <input type="text" id="orderQty" placeholder="例如：3隻 / 1箱 / 2罐">

        <label>收件地址 / 取貨備註</label>
        <textarea id="orderAddress" rows="3" placeholder="請輸入地址，若自取請寫「自取」"></textarea>

        <button id="submitBtn" onclick="submitFinalOrder()">確認送出訂單</button>
    </div>
</div>

<script>
const myLiffId = "您的_LIFF_ID"; 
const gasUrl = "您的_GAS_WEB_APP_URL"; // 務必使用部署後的 /exec 網址

let currentUser = null;

window.onload = async function() {
    await liff.init({ liffId: myLiffId });
    if (!liff.isLoggedIn()) {
        liff.login();
        return;
    }
    
    const userId = liff.getContext().userId;
    checkUserStatus(userId);
};

// 檢查使用者是否已登記
async function checkUserStatus(userId) {
    try {
        const response = await fetch(`${gasUrl}?action=checkUser&userId=${userId}`);
        const result = await response.json();
        
        document.getElementById('loading').style.display = 'none';
        
        if (result.exists) {
            // 已登記，直接進入訂購
            currentUser = result.user;
            showOrderSection();
        } else {
            // 未登記，顯示登記頁面
            document.getElementById('registerSection').classList.add('active');
        }
    } catch (e) {
        alert("連線失敗，請稍後再試");
    }
}

function showOrderSection() {
    document.getElementById('registerSection').classList.remove('active');
    document.getElementById('orderSection').classList.add('active');
    document.getElementById('welcomeMsg').innerHTML = `<b>${currentUser.name}</b> 您好，歡迎訂購：`;
}

// 首次登記過場
function nextStep() {
    const name = document.getElementById('regName').value.trim();
    const phone = document.getElementById('regPhone').value.trim();
    if (!name || !phone) return alert("請填寫姓名與電話");
    
    currentUser = { name, phone };
    showOrderSection();
}

// 最終送出訂單
async function submitFinalOrder() {
    const product = document.getElementById('productType').value;
    const qty = document.getElementById('orderQty').value.trim();
    const address = document.getElementById('orderAddress').value.trim();
    const userId = liff.getContext().userId;

    if (!qty || !address) return alert("請填寫數量與地址");

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerText = "傳送中...";

    try {
        const payload = {
            action: "createOrder",
            userId: userId,
            name: currentUser.name,
            phone: currentUser.phone,
            item: `${product} (${qty})`,
            address: address
        };

        const response = await fetch(gasUrl, {
            method: "POST",
            body: JSON.stringify(payload)
        });

        if (response.ok) {
            alert("訂單已成功送出！");
            liff.closeWindow();
        }
    } catch (e) {
        alert("送出失敗，請檢查網路");
        btn.disabled = false;
        btn.innerText = "確認送出訂單";
    }
}
</script>
</body>
</html>
