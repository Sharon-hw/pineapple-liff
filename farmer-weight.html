<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鳳梨歐巴 訂單處理系統</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@400;500;700&display=swap');
    :root {
      --green-dark:  #1B4332; --green-mid:   #2D6A4F; --green-light: #52B788;
      --gold:        #F4A228; --cream:       #FFFBF0; --brown-light: #F5ECD7;
      --text-main:   #1A1A1A; --text-muted:  #6B6B6B; --radius:      16px;
      --shadow:      0 4px 24px rgba(27,67,50,0.10);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans TC', sans-serif; background: var(--cream); color: var(--text-main); min-height: 100vh; padding-bottom: 40px; }

    .order-card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-left: 5px solid var(--gold); }
    .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .order-id { font-size: 11px; color: var(--text-muted); font-family: monospace; }
    .status-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #eee; }
    .status-wait { background: #FFE8D6; color: #D4891F; }
    .order-body { font-size: 14px; line-height: 1.6; }
    .order-footer { margin-top: 12px; display: flex; gap: 8px; }
    .btn-sm { flex: 1; padding: 8px; border-radius: 8px; border: none; font-size: 13px; font-weight: 700; cursor: pointer; }
    .btn-weight { background: var(--gold); color: var(--green-dark); }
    .status-confirming { background: #E1F5FE; color: #0288D1; }
    .status-weighting { background: #FFF9C4; color: #FBC02D; }

    .header { background: var(--green-dark); padding: 20px 20px 28px; position: relative; overflow: hidden; }
    .header::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 20px; background: var(--cream); border-radius: 20px 20px 0 0; }
    .logo { font-family: 'Noto Serif TC', serif; font-size: 22px; font-weight: 700; color: #fff; letter-spacing: 2px; }
    .logo span { color: var(--gold); }
    .card { background: #fff; border-radius: var(--radius); margin: 16px; padding: 24px 20px; box-shadow: var(--shadow); }
    .card-title { font-family: 'Noto Serif TC', serif; font-size: 17px; font-weight: 700; color: var(--green-dark); margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }
    .card-title::before { content: ''; display: block; width: 4px; height: 20px; background: var(--gold); border-radius: 2px; }
    .info-box { background: var(--brown-light); border-radius: 12px; padding: 14px 16px; margin-bottom: 20px; }
    .info-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px; }
    .info-key { color: var(--text-muted); }
    .info-val { font-weight: 700; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 13px; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; }
    .field input { width: 100%; padding: 12px 14px; border: 2px solid #E8DECE; border-radius: 10px; font-size: 20px; font-weight: 700; text-align: center; }
    .total-preview { background: rgba(45,106,79,0.06); border: 2px solid var(--green-light); border-radius: 12px; padding: 14px 16px; margin-bottom: 20px; text-align: center; display: none; }
    .amount { font-size: 28px; font-weight: 700; color: var(--green-dark); }
    .btn-submit { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--gold); font-size: 16px; font-weight: 700; color: var(--green-dark); cursor: pointer; }

    #loading { position: fixed; inset: 0; background: var(--cream); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-12px); }
    }
    .page { display: none; }
    .page.active { display: block; }
    .empty-state { text-align: center; padding: 40px; color: var(--text-muted); }
    #success-msg { white-space: pre-line; }
  </style>
</head>
<body>

<div id="loading">
  <div style="font-size:48px; animation: bounce 1s infinite;">🍍</div>
  <div class="loading-text">讀取農場資料中…</div>
</div>

<div class="header">
  <div class="logo">鳳梨<span>歐巴</span> <span style="font-size:14px;font-weight:400;color:rgba(255,255,255,0.7)">農場管理</span></div>
  <div style="font-size:12px; color: rgba(255,255,255,0.6);">訂單確認與秤重中心</div>
</div>

<div id="page-list" class="page">
  <div style="padding: 16px;">
    <h3 style="margin-bottom:12px; color: var(--green-dark);">📋 待處理項目</h3>
    <div id="order-container"></div>
  </div>
</div>

<div id="page-weight" class="page">
  <div class="card">
    <button onclick="showPage('page-list')" style="background:none; border:none; color:var(--green-mid); font-weight:700; margin-bottom:15px; cursor:pointer;">← 返回清單</button>
    <div class="card-title">秤重作業</div>
    <div class="info-box">
      <div class="info-row"><span class="info-key">客戶</span><span class="info-val" id="display-name">—</span></div>
      <div class="info-row"><span class="info-key">品項</span><span class="info-val" id="display-item">—</span></div>
      <div class="info-row"><span class="info-key">配送</span><span class="info-val" id="display-delivery">—</span></div>
      <div class="info-row"><span class="info-key">需求時間</span><span class="info-val" id="display-date">—</span></div>
    </div>

    <div id="weight-section">
      <div class="field">
        <label>實際重量（斤）</label>
        <input type="number" id="weight-input" placeholder="0.0" step="0.1" inputmode="decimal" oninput="calcTotal()">
      </div>
      <div class="total-preview" id="total-preview">
        <div style="font-size:13px">應收金額</div>
        <div class="amount" id="total-amount">$0</div>
      </div>
      <button class="btn-submit" id="submit-btn" onclick="submitWeight()">✅ 確認送出通知</button>
    </div>

    <div id="sauce-section" style="display:none; text-align:center;">
      <p style="color:var(--gold); font-weight:700; margin-bottom:20px;">此品項為豆豉醬，不需秤重</p>
      <button class="btn-submit" id="submit-btn-sauce" onclick="submitWeight()">✅ 直接確認通知</button>
    </div>
  </div>
</div>

<div id="page-success" class="page" style="text-align:center; padding: 60px 20px;">
  <div style="font-size:60px; margin-bottom:20px;">📦</div>
  <h2>處理完成！</h2>
  <p id="success-msg" style="margin:15px 0; color:var(--text-muted);"></p>
  <button class="btn-submit" style="max-width:200px" onclick="goBackToList()">處理下一筆</button>
</div>

<script>
const FARMER_LIFF_ID = '2009952707-VhlOHcQ1';
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxHIplbnb_g7zv85KkYsuKQq4m2lTF1keTqUIAtpe3D03uAZBPIotj7tnkuz3GIrUcK6g/exec';

let currentOrder = null;

async function initLiff() {
  const loadingEl = document.getElementById('loading');
  const loadingText = loadingEl.querySelector('.loading-text');
  loadingText.textContent = '初始化 LIFF…';
  try {
    await Promise.race([
      liff.init({ liffId: FARMER_LIFF_ID }),
      new Promise((_, reject) =>
        setTimeout(() => reject(new Error('LIFF init 逾時，請確認網路或 LIFF ID 是否正確')), 15000)
      )
    ]);

    loadingText.textContent = '確認登入狀態…';
    if (!liff.isLoggedIn()) { liff.login(); return; }

    loadingText.textContent = '讀取農場資料中…';
    const urlParams = new URLSearchParams(window.location.search);
    const orderId = urlParams.get('orderId');

    if (orderId) {
      loadSingleOrder(orderId);
    } else {
      loadOrderList();
    }
  } catch (err) {
    loadingEl.style.display = 'none';
    alert('載入失敗：' + err.message);
  }
}

async function loadOrderList() {
  const container = document.getElementById('order-container');
  container.innerHTML = '<div class="empty-state">讀取中...</div>';

  const controller = new AbortController();
  const tid = setTimeout(() => controller.abort(), 10000);

  try {
    const res = await fetch(`${GAS_URL}?action=getPendingOrders`, { signal: controller.signal });
    clearTimeout(tid);
    const data = await res.json();

    document.getElementById('loading').style.display = 'none';
    showPage('page-list');

    if (!data.orders || data.orders.length === 0) {
      container.innerHTML = '<div class="empty-state">🎉 目前沒有待處理訂單</div>';
      return;
    }

    container.innerHTML = '';
    data.orders.forEach(ord => {
      const card = document.createElement('div');
      card.className = 'order-card';

      let formattedDate = '-';
      if (ord.date) {
        const d = new Date(ord.date);
        if (!isNaN(d.getTime())) {
          const yyyy = d.getFullYear();
          const mm = String(d.getMonth() + 1).padStart(2, '0');
          const dd = String(d.getDate()).padStart(2, '0');
          formattedDate = `${yyyy}/${mm}/${dd}`;
        } else {
          formattedDate = String(ord.date).split('T')[0].replace(/-/g, '/');
        }
      }

      let displayStatus = '待處理';
      let badgeClass = 'status-wait';
      let buttonText = '👉 確認處理';

      if (ord.status === '待確認') {
        displayStatus = '待確認';
        badgeClass = 'status-confirming';
        buttonText = '👉 確認處理';
      } else if (ord.status === '已確認') {
        displayStatus = '待秤重';
        badgeClass = 'status-weighting';
        buttonText = '⚖️ 秤重處理';
      }

      card.innerHTML = `
        <div class="order-header">
          <span class="order-id">${ord.orderId}</span>
          <span class="status-badge ${badgeClass}">${displayStatus}</span>
        </div>
        <div class="order-body">
          <b>${ord.name}</b> (${ord.delivery})<br>
          <span style="color:var(--green-mid)">${ord.item}<br>需求時間：${formattedDate}<br>${ord.delivery}＋ ＋${ord.recvAddr}</span>
        </div>
        <div class="order-footer">
          <button id="btn-${ord.orderId}" class="btn-sm btn-weight">${buttonText}</button>
          ${ord.status === '待確認' ? `
          <button id="btn-reject-${ord.orderId}" class="btn-sm" style="background:#FFE0E0;color:#C0392B">❌ 拒絕</button>
          ` : ''}
        </div>
      `;

      card.querySelector(`[id="btn-${ord.orderId}"]`).addEventListener('click', () => {
        if (ord.status === '待確認') {
          confirmOrderDirectly(ord.orderId, ord.customerLineId);
        } else {
          loadSingleOrder(ord.orderId);
        }
      });

      const rejectBtn = card.querySelector(`[id="btn-reject-${ord.orderId}"]`);
      if (rejectBtn) {
        rejectBtn.addEventListener('click', () => rejectOrderDirectly(ord.orderId, ord.customerLineId));
      }

      container.appendChild(card);
    });
  } catch (e) {
    clearTimeout(tid);
    document.getElementById('loading').style.display = 'none';
    showPage('page-list');
    const errMsg = e.name === 'AbortError' ? '連線逾時（GAS 超過 10 秒未回應）' : `連線 GAS 發生錯誤：${e.message}`;
    container.innerHTML = `<div class="empty-state">${errMsg}</div>`;
  }
}

async function confirmOrderDirectly(orderId, customerLineId) {
  if (!confirm(`確定要確認訂單 ${orderId} 嗎？`)) return;
  const btn = document.getElementById(`btn-${orderId}`);
  if (!btn) return;

  btn.disabled = true;
  btn.textContent = '處理中...';
  const url = `${GAS_URL}?action=confirmOrder&orderId=${encodeURIComponent(orderId)}&customerLineId=${encodeURIComponent(customerLineId)}`;

  try {
    const res = await fetch(url);
    const data = await res.json();

    if (data.ok) {
      alert('訂單已確認，客戶已收到通知！');
      loadOrderList();
    } else {
      throw new Error(data.message || '更新失敗');
    }
  } catch (e) {
    console.error('確認訂單發生錯誤:', e);
    alert('確認失敗，請檢查網路連線或 GAS 權限。');
    btn.disabled = false;
    btn.textContent = '👉 確認處理';
  }
}

async function rejectOrderDirectly(orderId, customerLineId) {
  if (!confirm(`確定要拒絕訂單 ${orderId} 嗎？\n客戶將會收到無法接單的通知。`)) return;

  const url = `${GAS_URL}?action=rejectOrder&orderId=${encodeURIComponent(orderId)}&customerLineId=${encodeURIComponent(customerLineId)}`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    if (data.ok) {
      alert('已拒絕訂單，客戶已收到通知。');
      loadOrderList();
    } else {
      throw new Error(data.message || data.error || JSON.stringify(data));
    }
  } catch (e) {
    alert('拒絕失敗：' + e.message);
  }
}

async function loadSingleOrder(orderId) {
  document.getElementById('loading').style.display = 'flex';
  try {
    const res = await fetch(`${GAS_URL}?action=getOrder&orderId=${encodeURIComponent(orderId)}`);
    currentOrder = await res.json();

    document.getElementById('display-name').textContent = currentOrder.name;
    document.getElementById('display-item').textContent = currentOrder.item;
    document.getElementById('display-delivery').textContent = currentOrder.delivery;
    document.getElementById('display-date').textContent = currentOrder.recvDate || '未填寫';

    document.getElementById('weight-input').value = '';
    document.getElementById('total-preview').style.display = 'none';

    const isSauce = currentOrder.item.indexOf('罐') > -1;
    if (isSauce) {
      document.getElementById('weight-section').style.display = 'none';
      document.getElementById('sauce-section').style.display = 'block';
    } else {
      document.getElementById('weight-section').style.display = 'block';
      document.getElementById('sauce-section').style.display = 'none';
    }

    document.getElementById('loading').style.display = 'none';
    showPage('page-weight');
    calcTotal();
  } catch (e) {
    alert('讀取單筆訂單失敗');
    loadOrderList();
  }
}

function goBackToList() {
  currentOrder = null;
  const url = new URL(window.location.href);
  url.searchParams.delete('orderId');
  window.history.replaceState({}, '', url);
  showPage('page-list');
  loadOrderList();
}

function calcTotal() {
  if (!currentOrder) return;

  const w = parseFloat(document.getElementById('weight-input').value) || 0;
  const isSauce = currentOrder.item.indexOf('罐') > -1;

  let total = 0;
  if (isSauce) {
    total = currentOrder.item.indexOf('大') > -1 ? 300 : 150;
  } else {
    total = Math.round(w * 30);
  }

  if (currentOrder.delivery === '宅配到府') {
    total += 150;
  }

  const preview = document.getElementById('total-preview');
  preview.style.display = (isSauce || w > 0) ? 'block' : 'none';
  document.getElementById('total-amount').textContent = '$' + total.toLocaleString();
}

async function submitWeight() {
  const weight    = document.getElementById('weight-input').value;
  const submitBtn = document.getElementById('submit-btn') || document.getElementById('submit-btn-sauce');
  const isSauce   = currentOrder.item.indexOf('罐') > -1;

  if (!isSauce && !weight) { alert('請輸入實際重量'); return; }

  submitBtn.disabled    = true;
  submitBtn.textContent = '傳送中...';

  const w = parseFloat(weight) || 0;

  let total = 0;
  if (isSauce) {
    total = currentOrder.item.indexOf('大') > -1 ? 300 : 150;
  } else {
    total = Math.round(w * 30);
  }

  if (currentOrder.delivery === '宅配到府') {
    total += 150;
  }

  try {
    const res = await fetch(
      GAS_URL +
      '?action=updateWeight' +
      '&orderId='        + encodeURIComponent(currentOrder.orderId) +
      '&weight='         + w +
      '&total='          + total +
      '&customerLineId=' + encodeURIComponent(currentOrder.customerLineId || '')
    );
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || '更新失敗');

    submitBtn.disabled    = false;
    submitBtn.textContent = isSauce ? '✅ 直接確認通知' : '✅ 確認送出通知';
    document.getElementById('success-msg').textContent =
      currentOrder.name + ' 的訂單已更新！\n' +
      (isSauce ? '品項：豆豉醬' : '重量：' + w + ' 斤') + '　總金額：$' + total;
    showPage('page-success');

  } catch (e) {
    console.error('傳送錯誤:', e);
    alert('儲存失敗：' + e.message);
    submitBtn.disabled    = false;
    submitBtn.textContent = '✅ 確認送出通知';
  }
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

window.onload = initLiff;
</script>
</body>
</html>
