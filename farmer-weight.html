<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鳳梨歐巴 訂單秤重</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@400;500;700&display=swap');
    :root {
      --green-dark:  #1B4332;
      --green-mid:   #2D6A4F;
      --green-light: #52B788;
      --gold:        #F4A228;
      --cream:       #FFFBF0;
      --brown-light: #F5ECD7;
      --text-main:   #1A1A1A;
      --text-muted:  #6B6B6B;
      --radius:      16px;
      --shadow:      0 4px 24px rgba(27,67,50,0.10);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--cream);
      color: var(--text-main);
      min-height: 100vh;
      padding-bottom: 40px;
    }

/* 新增：清單專用樣式 */
    .order-card {
      background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-left: 5px solid var(--gold);
    }
    .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .order-id { font-size: 11px; color: var(--text-muted); font-family: monospace; }
    .status-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #eee; }
    .status-wait { background: #FFE8D6; color: #D4891F; }
    .order-body { font-size: 14px; line-height: 1.6; }
    .order-footer { margin-top: 12px; display: flex; gap: 8px; }
    .btn-sm { flex: 1; padding: 8px; border-radius: 8px; border: none; font-size: 13px; font-weight: 700; cursor: pointer; }
    .btn-confirm { background: var(--green-mid); color: #fff; }
    .btn-weight { background: var(--gold); color: var(--green
    
    .header {
      background: var(--green-dark);
      padding: 20px 20px 28px;
      position: relative;
      overflow: hidden;
    }
    .header::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 20px;
      background: var(--cream);
      border-radius: 20px 20px 0 0;
    }
    .header-inner { position: relative; z-index: 1; }
    .logo {
      font-family: 'Noto Serif TC', serif;
      font-size: 22px; font-weight: 700;
      color: #fff; letter-spacing: 2px;
    }
    .logo span { color: var(--gold); }
    .header-sub { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 4px; }
    .card {
      background: #fff;
      border-radius: var(--radius);
      margin: 16px;
      padding: 24px 20px;
      box-shadow: var(--shadow);
    }
    .card-title {
      font-family: 'Noto Serif TC', serif;
      font-size: 17px; font-weight: 700;
      color: var(--green-dark);
      margin-bottom: 18px;
      display: flex; align-items: center; gap: 8px;
    }
    .card-title::before {
      content: '';
      display: block;
      width: 4px; height: 20px;
      background: var(--gold);
      border-radius: 2px;
    }
    .info-box {
      background: var(--brown-light);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 20px;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      margin-bottom: 8px;
    }
    .info-row:last-child { margin-bottom: 0; }
    .info-key { color: var(--text-muted); }
    .info-val { font-weight: 700; }
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 13px; font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #E8DECE;
      border-radius: 10px;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 20px; font-weight: 700;
      color: var(--text-main);
      background: #FAFAF7;
      outline: none;
      text-align: center;
      -webkit-appearance: none;
    }
    .field input:focus {
      border-color: var(--green-mid);
      background: #fff;
    }
    .unit-hint {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
    }
    .total-preview {
      background: rgba(45,106,79,0.06);
      border: 2px solid var(--green-light);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 20px;
      text-align: center;
      display: none;
    }
    .total-preview .label { font-size: 13px; color: var(--text-muted); }
    .total-preview .amount {
      font-size: 28px; font-weight: 700;
      color: var(--green-dark);
      margin-top: 4px;
    }
    .btn-submit {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: none;
      background: var(--gold);
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 16px; font-weight: 700;
      color: var(--green-dark);
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.2s;
    }
    .btn-submit:active { background: #d4891f; transform: scale(0.98); }
    .btn-submit:disabled { background: #C8C8C8; color: #fff; cursor: not-allowed; }
    #loading {
      position: fixed; inset: 0;
      background: var(--cream);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 100;
    }
    .loading-pineapple { font-size: 48px; animation: bounce 1s ease-in-out infinite; }
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-12px); }
    }
    .loading-text { margin-top: 16px; font-size: 14px; color: var(--text-muted); }
    .toast {
      position: fixed;
      bottom: 30px; left: 50%; transform: translateX(-50%);
      background: var(--green-dark); color: #fff;
      padding: 10px 20px; border-radius: 20px;
      font-size: 13px; font-weight: 500;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s; white-space: nowrap; z-index: 200;
    }
    .toast.show { opacity: 1; }
    #page-success {
      text-align: center; padding: 40px 24px;
    }
    .success-icon {
      width: 80px; height: 80px; border-radius: 50%;
      background: rgba(82,183,136,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 40px; margin: 0 auto 20px;
    }
    #page-success h2 {
      font-family: 'Noto Serif TC', serif;
      font-size: 22px; color: var(--green-dark); margin-bottom: 10px;
    }
    #page-success p { font-size: 14px; color: var(--text-muted); line-height: 1.7; }
    .close-btn {
      margin-top: 32px; padding: 14px 40px;
      border-radius: 12px; border: none;
      background: var(--green-mid); color: #fff;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 15px; font-weight: 700; cursor: pointer;
    }
    .page { display: none; }
    .page.active { display: block; }
  </style>
</head>
<body>

<div id="loading">
  <div style="font-size:48px; animation: bounce 1s infinite;">🍍</div>
  <div class="loading-text">讀取農場資料中…</div>
</div>

<div class="header">
  <div class="logo">鳳梨<span>歐巴</span> <span style="font-size:14px;font-weight:400;color:rgba(255,255,255,0.7)">農場管理</span></div>
  <div style="font-size:12px; color: rgba(255,255,255,0.6);">訂單確認與秤重中心</div>
</div>

<!-- ========== 1. 訂單清單頁 ========== -->
<div id="page-list" class="page">
  <div style="padding: 16px;">
    <h3 style="margin-bottom:12px; color: var(--green-dark);">📋 待處理項目</h3>
    <div id="order-container">
      <!-- 動態載入清單 -->
    </div>
  </div>
</div>

<!-- ========== 2. 秤重作業頁 ========== -->
<div id="page-weight" class="page">
  <div class="card">
    <button onclick="showPage('page-list')" style="background:none; border:none; color:var(--green-mid); font-weight:700; margin-bottom:15px; display:flex; align-items:center;">← 返回清單</button>
    <div class="card-title">秤重作業</div>
    <div class="info-box">
      <div class="info-row"><span class="info-key">客戶</span><span class="info-val" id="display-name">—</span></div>
      <div class="info-row"><span class="info-key">品項</span><span class="info-val" id="display-item">—</span></div>
      <div class="info-row"><span class="info-key">配送</span><span class="info-val" id="display-delivery">—</span></div>
    </div>
    
    <div id="weight-section">
      <div class="field">
        <label>實際重量（斤）</label>
        <input type="number" id="weight-input" placeholder="0.0" step="0.1" oninput="calcTotal()">
      </div>
      <div class="total-preview" id="total-preview">
        <div style="font-size:13px">應收金額</div>
        <div class="amount" id="total-amount">$0</div>
      </div>
      <button class="btn-submit" id="submit-btn" onclick="submitWeight()">✅ 確認送出通知</button>
    </div>

    <!-- 豆豉醬專用區域 (隱藏) -->
    <div id="sauce-section" style="display:none; text-align:center;">
      <p style="color:var(--gold); font-weight:700; margin-bottom:20px;">此品項為豆豉醬，不需秤重</p>
      <button class="btn-submit" onclick="submitWeight()">✅ 直接確認通知</button>
    </div>
  </div>
</div>

<!-- ========== 3. 成功頁 ========== -->
<div id="page-success" class="page" style="text-align:center; padding: 60px 20px;">
  <div style="font-size:60px; margin-bottom:20px;">📦</div>
  <h2>處理完成！</h2>
  <p id="success-msg" style="margin:15px 0; color:var(--text-muted);"></p>
  <button class="btn-submit" style="max-width:200px" onclick="location.reload()">處理下一筆</button>
</div>

<script>
const FARMER_LIFF_ID = '2009952707-VhlOHcQ1';
const GAS_URL = '你的_GAS_URL'; // 請更換為你的 URL

let currentOrder = null;

async function initLiff() {
  try {
    await liff.init({ liffId: FARMER_LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }

    const urlParams = new URLSearchParams(window.location.search);
    const orderId = urlParams.get('orderId');

    // 邏輯判斷：若有 orderId 則進入單筆，否則顯示清單
    if (orderId) {
      loadSingleOrder(orderId);
    } else {
      loadOrderList();
    }
  } catch (err) {
    alert('載入失敗: ' + err.message);
  }
}

// 載入清單
async function loadOrderList() {
  const container = document.getElementById('order-container');
  container.innerHTML = '<div class="empty-state">讀取中...</div>';
  
  try {
    const res = await fetch(GAS_URL + '?action=getPendingOrders');
    const data = await res.json();
    document.getElementById('loading').style.display = 'none';
    showPage('page-list');

    if (data.orders.length === 0) {
      container.innerHTML = '<div class="empty-state">🎉 目前沒有待處理訂單</div>';
      return;
    }

    container.innerHTML = '';
    data.orders.forEach(ord => {
      const card = document.createElement('div');
      card.className = 'order-card';
      // 根據狀態顯示不同按鈕
      const needsWeight = !ord.weight && !ord.product.includes('豆豉');
      
      card.innerHTML = `
        <div class="order-header">
          <span class="order-id">${ord.orderId}</span>
          <span class="status-badge ${needsWeight ? 'status-wait' : ''}">${needsWeight ? '待秤重' : '待確認'}</span>
        </div>
        <div class="order-body">
          <b>${ord.name}</b> (${ord.delivery})<br>
          <span style="color:var(--green-mid)">${ord.product} ${ord.spec} x${ord.qty}</span>
        </div>
        <div class="order-footer">
          <button class="btn-sm btn-weight" onclick="loadSingleOrder('${ord.orderId}')">
            ${needsWeight ? '⚖️ 秤重處理' : '👉 確認處理'}
          </button>
        </div>
      `;
      container.appendChild(card);
    });
  } catch (e) {
    container.innerHTML = '<div class="empty-state">載入發生錯誤</div>';
  }
}

// 載入單筆
async function loadSingleOrder(orderId) {
  document.getElementById('loading').style.display = 'flex';
  try {
    const res = await fetch(GAS_URL + '?action=getOrder&orderId=' + encodeURIComponent(orderId));
    currentOrder = await res.json();
    
    document.getElementById('display-name').textContent = currentOrder.name;
    document.getElementById('display-item').textContent = currentOrder.item;
    document.getElementById('display-delivery').textContent = currentOrder.delivery;
    
    // 判斷是否為豆豉醬
    const isSauce = currentOrder.item.includes('豆豉');
    document.getElementById('weight-section').style.display = isSauce ? 'none' : 'block';
    document.getElementById('sauce-section').style.display = isSauce ? 'block' : 'none';

    document.getElementById('loading').style.display = 'none';
    showPage('page-weight');
  } catch (e) {
    alert('讀取訂單失敗');
    loadOrderList();
  }
}

function calcTotal() {
  const w = parseFloat(document.getElementById('weight-input').value) || 0;
  const total = Math.round(w * 30);
  const preview = document.getElementById('total-preview');
  preview.style.display = w > 0 ? 'block' : 'none';
  document.getElementById('total-amount').textContent = '$' + total.toLocaleString();
}

async function submitWeight() {
  const weight = parseFloat(document.getElementById('weight-input').value) || 0;
  // ... 這裡延續你原本的 submitWeight 邏輯 (呼叫 updateWeight API) ...
  // 送出成功後顯示成功頁
  document.getElementById('success-msg').textContent = '訂單已成功更新並通知客戶';
  showPage('page-success');
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

window.onload = initLiff;
</script>
</body>
</html>
