<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>阿閎鳳梨 訂單秤重</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@400;500;700&display=swap');
    :root {
      --green-dark:  #1B4332;
      --green-mid:   #2D6A4F;
      --green-light: #52B788;
      --gold:        #F4A228;
      --cream:       #FFFBF0;
      --brown-light: #F5ECD7;
      --text-main:   #1A1A1A;
      --text-muted:  #6B6B6B;
      --radius:      16px;
      --shadow:      0 4px 24px rgba(27,67,50,0.10);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--cream);
      color: var(--text-main);
      min-height: 100vh;
      padding-bottom: 40px;
    }
    .header {
      background: var(--green-dark);
      padding: 20px 20px 28px;
      position: relative;
      overflow: hidden;
    }
    .header::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 20px;
      background: var(--cream);
      border-radius: 20px 20px 0 0;
    }
    .header-inner { position: relative; z-index: 1; }
    .logo {
      font-family: 'Noto Serif TC', serif;
      font-size: 22px; font-weight: 700;
      color: #fff; letter-spacing: 2px;
    }
    .logo span { color: var(--gold); }
    .header-sub { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 4px; }
    .card {
      background: #fff;
      border-radius: var(--radius);
      margin: 16px;
      padding: 24px 20px;
      box-shadow: var(--shadow);
    }
    .card-title {
      font-family: 'Noto Serif TC', serif;
      font-size: 17px; font-weight: 700;
      color: var(--green-dark);
      margin-bottom: 18px;
      display: flex; align-items: center; gap: 8px;
    }
    .card-title::before {
      content: '';
      display: block;
      width: 4px; height: 20px;
      background: var(--gold);
      border-radius: 2px;
    }
    .info-box {
      background: var(--brown-light);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 20px;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      margin-bottom: 8px;
    }
    .info-row:last-child { margin-bottom: 0; }
    .info-key { color: var(--text-muted); }
    .info-val { font-weight: 700; }
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 13px; font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #E8DECE;
      border-radius: 10px;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 20px; font-weight: 700;
      color: var(--text-main);
      background: #FAFAF7;
      outline: none;
      text-align: center;
      -webkit-appearance: none;
    }
    .field input:focus {
      border-color: var(--green-mid);
      background: #fff;
    }
    .unit-hint {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
    }
    .total-preview {
      background: rgba(45,106,79,0.06);
      border: 2px solid var(--green-light);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 20px;
      text-align: center;
      display: none;
    }
    .total-preview .label { font-size: 13px; color: var(--text-muted); }
    .total-preview .amount {
      font-size: 28px; font-weight: 700;
      color: var(--green-dark);
      margin-top: 4px;
    }
    .btn-submit {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: none;
      background: var(--gold);
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 16px; font-weight: 700;
      color: var(--green-dark);
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.2s;
    }
    .btn-submit:active { background: #d4891f; transform: scale(0.98); }
    .btn-submit:disabled { background: #C8C8C8; color: #fff; cursor: not-allowed; }
    #loading {
      position: fixed; inset: 0;
      background: var(--cream);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 100;
    }
    .loading-pineapple { font-size: 48px; animation: bounce 1s ease-in-out infinite; }
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-12px); }
    }
    .loading-text { margin-top: 16px; font-size: 14px; color: var(--text-muted); }
    .toast {
      position: fixed;
      bottom: 30px; left: 50%; transform: translateX(-50%);
      background: var(--green-dark); color: #fff;
      padding: 10px 20px; border-radius: 20px;
      font-size: 13px; font-weight: 500;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s; white-space: nowrap; z-index: 200;
    }
    .toast.show { opacity: 1; }
    #page-success {
      text-align: center; padding: 40px 24px;
    }
    .success-icon {
      width: 80px; height: 80px; border-radius: 50%;
      background: rgba(82,183,136,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 40px; margin: 0 auto 20px;
    }
    #page-success h2 {
      font-family: 'Noto Serif TC', serif;
      font-size: 22px; color: var(--green-dark); margin-bottom: 10px;
    }
    #page-success p { font-size: 14px; color: var(--text-muted); line-height: 1.7; }
    .close-btn {
      margin-top: 32px; padding: 14px 40px;
      border-radius: 12px; border: none;
      background: var(--green-mid); color: #fff;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 15px; font-weight: 700; cursor: pointer;
    }
    .page { display: none; }
    .page.active { display: block; }
  </style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="loading-pineapple">🍍</div>
  <div class="loading-text">載入中…</div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Header -->
<div class="header">
  <div class="header-inner">
    <div class="logo">鳳梨<span>歐巴</span> <span style="font-size:14px;font-weight:400;color:rgba(255,255,255,0.7)">農場管理</span></div>
    <div class="header-sub">訂單秤重作業</div>
  </div>
</div>

<!-- ========== 秤重頁 ========== -->
<div id="page-weight" class="page">
  <div class="card">
    <div class="card-title">訂單資訊</div>
    <div class="info-box">
      <div class="info-row">
        <span class="info-key">訂單編號</span>
        <span class="info-val" id="display-orderid">—</span>
      </div>
      <div class="info-row">
        <span class="info-key">客戶</span>
        <span class="info-val" id="display-name">—</span>
      </div>
      <div class="info-row">
        <span class="info-key">品項</span>
        <span class="info-val" id="display-item">—</span>
      </div>
      <div class="info-row">
        <span class="info-key">需求時間</span>
        <span class="info-val" id="display-date">—</span>
      </div>
      <div class="info-row">
        <span class="info-key">配送</span>
        <span class="info-val" id="display-delivery">—</span>
      </div>
    </div>

    <div class="card-title" style="margin-top:4px">填寫重量</div>
    <div class="field">
      <label>實際重量（斤）</label>
      <input type="number" id="weight-input" placeholder="0.0"
             step="0.1" min="0" oninput="calcTotal()">
      <div class="unit-hint">1 斤 = 600g，單價 $30／斤</div>
    </div>

    <!-- 即時金額預覽 -->
    <div class="total-preview" id="total-preview">
      <div class="label">應收金額</div>
      <div class="amount" id="total-amount">$0</div>
    </div>

    <button class="btn-submit" id="submit-btn" onclick="submitWeight()">
      ✅ 確認送出並通知客戶
    </button>
  </div>
</div>

<!-- ========== 成功頁 ========== -->
<div id="page-success" class="page">
  <div class="success-icon">✅</div>
  <h2>已通知客戶！</h2>
  <p id="success-msg">重量與金額已更新<br>客戶已收到付款通知</p>
  <button class="close-btn" onclick="liff.closeWindow()">關閉視窗</button>
</div>

<script>
// =============================================
// 設定
// =============================================
const FARMER_LIFF_ID = '2009952707-VhlOHcQ1'; // ← 填入農場主人專用 LIFF ID
const GAS_URL        = 'https://script.google.com/macros/s/AKfycbxHIplbnb_g7zv85KkYsuKQq4m2lTF1keTqUIAtpe3D03uAZBPIotj7tnkuz3GIrUcK6g/exec';
const PRICE_PER_JIN  = 30; // 每斤單價

// =============================================
// 狀態
// =============================================
let orderId      = '';
let customerLineId = '';
let isSubmitting = false;

// =============================================
// 初始化
// =============================================
async function initLiff() {
  const loadingText = document.querySelector('.loading-text');
  try {
    loadingText.textContent = 'LIFF 初始化中…';
    await liff.init({ liffId: FARMER_LIFF_ID });

    if (!liff.isLoggedIn()) { liff.login(); return; }

    // 從 URL 取得 orderId（由 notifyFarmer 的 LIFF 連結帶入）
    const urlParams    = new URLSearchParams(window.location.search);
    orderId            = decodeURIComponent(urlParams.get('orderId') || '');
    customerLineId     = decodeURIComponent(urlParams.get('customerLineId') || '');

    if (!orderId) {
      loadingText.textContent = '找不到訂單編號';
      return;
    }

    // 查詢訂單詳情
    loadingText.textContent = '載入訂單資料…';
    const res   = await fetch(GAS_URL + '?action=getOrder&orderId=' + encodeURIComponent(orderId));
    const order = await res.json();

    if (!order.found) {
      loadingText.textContent = '找不到此訂單';
      return;
    }

    // 顯示訂單資訊
    document.getElementById('display-orderid').textContent  = order.orderId;
    document.getElementById('display-name').textContent     = order.name + '　' + order.phone;
    document.getElementById('display-item').textContent     = order.item;
    document.getElementById('display-date').textContent     = order.recvDate || '未填寫';
    document.getElementById('display-delivery').textContent = order.delivery;

    document.getElementById('loading').style.display = 'none';
    showPage('page-weight');

  } catch (err) {
    console.error('LIFF Error:', err);
    loadingText.textContent = '❌ 載入失敗：' + err.message;
  }
}

// =============================================
// 即時計算金額
// =============================================
function calcTotal() {
  const w       = parseFloat(document.getElementById('weight-input').value) || 0;
  const total   = Math.round(w * PRICE_PER_JIN);
  const preview = document.getElementById('total-preview');
  const amount  = document.getElementById('total-amount');

  if (w > 0) {
    preview.style.display = 'block';
    amount.textContent    = '$' + total.toLocaleString();
  } else {
    preview.style.display = 'none';
  }
}

// =============================================
// 送出秤重
// =============================================
async function submitWeight() {
  if (isSubmitting) return;
  const weight = parseFloat(document.getElementById('weight-input').value);
  if (!weight || weight <= 0) { showToast('請輸入正確重量'); return; }

  isSubmitting = true;
  const btn    = document.getElementById('submit-btn');
  btn.disabled    = true;
  btn.textContent = '送出中…';

  const total  = Math.round(weight * PRICE_PER_JIN);

  try {
    const res  = await fetch(
      GAS_URL + '?action=updateWeight' +
      '&orderId='         + encodeURIComponent(orderId) +
      '&weight='          + weight +
      '&total='           + total +
      '&customerLineId='  + encodeURIComponent(customerLineId)
    );
    const data = await res.json();

    if (!data.ok) throw new Error(data.error || '更新失敗');

    document.getElementById('success-msg').innerHTML =
      '重量：' + weight + ' 斤<br>應收金額：$' + total.toLocaleString() + '<br><br>客戶已收到付款通知 🍍';
    showPage('page-success');

  } catch (err) {
    console.error(err);
    isSubmitting        = false;
    btn.disabled        = false;
    btn.textContent     = '✅ 確認送出並通知客戶';
    showToast('送出失敗：' + err.message);
  }
}

// =============================================
// 工具
// =============================================
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

window.addEventListener('load', initLiff);
</script>
</body>
</html>
